<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HardHits v2 | Probability Engine</title>
    <script src="dataFiles/hr_model_data.js"></script>
    <style>
        :root {
            --bg: #05070a; --card: #0f172a; --border: #1e293b;
            --accent: #f43f5e; --gold: #fbbf24; --emerald: #10b981;
            --text: #f8fafc; --text-dim: #94a3b8;
            --elite: linear-gradient(135deg, #f43f5e 0%, #fbbf24 100%);
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }
        
        header { 
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); padding: 20px 5%;
            position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center;
        }

        .tier-legend { display: flex; gap: 15px; font-size: 0.75rem; font-weight: 700; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        .container { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 16px; 
            overflow: hidden; position: relative; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-5px); border-color: #334155; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); }

        /* TIER STYLES */
        .elite-border { border-top: 4px solid var(--accent); }
        .solid-border { border-top: 4px solid var(--emerald); }

        .card-header { padding: 24px; display: flex; justify-content: space-between; align-items: flex-start; }
        .player-info h2 { margin: 0; font-size: 1.5rem; letter-spacing: -0.5px; }
        .team-tag { font-size: 0.7rem; font-weight: 800; color: var(--accent); text-transform: uppercase; }

        .prob-hex { 
            background: #1e293b; padding: 12px; border-radius: 12px; text-align: center;
            min-width: 60px; border: 1px solid var(--border);
        }
        .prob-val { display: block; font-size: 1.4rem; font-weight: 900; color: var(--gold); }
        .prob-label { font-size: 0.6rem; color: var(--text-dim); font-weight: 700; }

        .stats-box { padding: 0 24px 24px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.85rem; }
        .stat-label { color: var(--text-dim); }
        
        .progress-container { height: 6px; background: #1e293b; border-radius: 10px; margin-top: 4px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: 1s ease-out; }

        .meta-footer { 
            background: rgba(0,0,0,0.2); padding: 15px 24px; border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem;
        }
        .trend-badge { padding: 4px 10px; border-radius: 20px; font-weight: 800; font-size: 0.65rem; }
        .hot { background: rgba(244, 63, 94, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .stable { background: rgba(16, 185, 129, 0.1); color: var(--emerald); border: 1px solid var(--emerald); }

        .park-tag { color: var(--gold); font-weight: 700; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; font-size: 1.2rem; color: var(--accent);">HARDHITS <span style="color:white">v2.0</span></div>
    <div class="tier-legend">
        <div class="legend-item"><div class="dot" style="background: var(--accent);"></div> ELITE (>8%)</div>
        <div class="legend-item"><div class="dot" style="background: var(--emerald);"></div> SOLID (5-8%)</div>
        <div class="legend-item"><div class="dot" style="background: var(--text-dim);"></div> NEUTRAL</div>
    </div>
</header>

<div class="container">
    <div style="margin-bottom: 40px;">
        <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Daily HR Model</h1>
        <p style="color: var(--text-dim);">Weighted Formula: 25% Exit Velocity | 20% Barrels | 15% Pitcher Vulnerability</p>
    </div>

    <div id="dashboard" class="grid">
        </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const dash = document.getElementById('dashboard');

        if (typeof hrModelData === 'undefined' || hrModelData.length === 0) {
            dash.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; border: 2px dashed var(--border); border-radius: 20px;">
                <h3 style="color: var(--text-dim)">Waiting for Engine...</h3>
                <p>Run <code>python hr_engine_v2.py</code> to generate the 2026 data feed.</p>
            </div>`;
            return;
        }

        hrModelData.forEach(p => {
            const tierClass = p.probability >= 8 ? 'elite-border' : (p.probability >= 5 ? 'solid-border' : '');
            const trendClass = p.ev_trend_val > 1.5 ? 'hot' : 'stable';
            
            dash.innerHTML += `
                <div class="card ${tierClass}">
                    <div class="card-header">
                        <div class="player-info">
                            <span class="team-tag">${p.team}</span>
                            <h2>${p.name}</h2>
                            <div style="margin-top: 8px;">
                                <span class="trend-badge ${trendClass}">${p.ev_trend_label}: ${p.ev_trend_val > 0 ? '+' : ''}${p.ev_trend_val} MPH</span>
                            </div>
                        </div>
                        <div class="prob-hex">
                            <span class="prob-val">${p.probability}%</span>
                            <span class="prob-label">PROBABILITY</span>
                        </div>
                    </div>

                    <div class="stats-box">
                        <div class="stat-row">
                            <span class="stat-label">Max Exit Velo (7d)</span>
                            <span style="font-weight: 700;">${p.max_ev} MPH</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-fill" style="width: ${p.max_ev_pct}%; background: var(--accent);"></div>
                        </div>

                        <div class="stat-row" style="margin-top: 15px;">
                            <span class="stat-label">Fly Ball EV (Avg)</span>
                            <span style="font-weight: 700;">${p.fb_ev} MPH</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-fill" style="width: ${p.fb_ev_pct}%; background: var(--gold);"></div>
                        </div>
                    </div>

                    <div class="meta-footer">
                        <div>vs. <span style="color: white; font-weight: 700;">${p.opp_pitcher}</span></div>
                        <div class="park-tag">${p.park_factor}</div>
                    </div>
                </div>
            `;
        });
    });
</script>

</body>
</html>
