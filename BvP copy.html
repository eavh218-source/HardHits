<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HardHits | BvP Analytics</title>
    <script src="dataFiles/bvp_data.js"></script>
    <style>
        :root { 
            --bg: #0b0f19; --card: #111827; --card-hover: #1a2234;
            --border: #1e293b; --accent: #f87171; --text: #e2e8f0; --text-dim: #94a3b8; 
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* NAVIGATION BAR */
        nav { 
            background: #111827; border-bottom: 1px solid var(--border); 
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo { color: var(--accent); font-weight: 900; font-size: 1.4rem; text-decoration: none; letter-spacing: 2px; }
        .nav-links a { color: var(--text-dim); text-decoration: none; margin-left: 25px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
        .nav-links a:hover { color: var(--accent); }

        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }

        /* MATCHUP GRID - ROW OF 5 */
        .matchup-grid {
            display: grid; 
            grid-template-columns: repeat(5, 1fr);
            gap: 10px; margin-bottom: 50px;
        }
        .matchup-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 6px; padding: 12px; position: relative;
        }
        .card-header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; }
        .live-dot { width: 5px; height: 5px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .team-row { display: flex; justify-content: space-between; align-items: center; margin: 5px 0; }
        .team-abbr { font-size: 1.1rem; font-weight: 900; }
        .p-name { font-size: 0.75rem; color: var(--text-dim); }
        .vs-divider { text-align: center; font-size: 0.5rem; color: var(--accent); font-weight: 900; margin: 2px 0; opacity: 0.4; }

        /* DATA SECTIONS */
        .section-title { font-size: 0.85rem; text-transform: uppercase; color: var(--accent); font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .leader-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; margin-bottom: 50px; }
        .leader-card { background: var(--card); border-left: 4px solid var(--accent); padding: 15px; border-radius: 6px; }

        /* TABLES */
        .p-group { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; overflow: hidden; }
        .p-header { background: var(--card); padding: 15px; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px 20px; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        
        @media (max-width: 1200px) { .matchup-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .matchup-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<nav style="background: #111827; border-bottom: 1px solid #1e293b; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center;">
    <a href="HardHits.html" style="color: #f87171; font-weight: 900; font-size: 1.4rem; text-decoration: none; letter-spacing: 2px;">HARDHITS</a>
    <div style="display: flex; gap: 25px;">
        <a href="DailyHomers.html" style="color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">Daily Homers</a>
        <a href="BvP.html" style="color: #94a3b8; text-decoration: none; font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">BvP Matchups</a>
    </div>
</nav>

<div class="container">
    <div class="section-title">Daily Matchups</div>
    <div id="grid-box" class="matchup-grid"></div>

    <div class="section-title">☄️ Power Leaders (by Distance)</div>
    <div id="leaderboard" class="leader-grid"></div>

    <div class="section-title">Pitcher Scouting Reports</div>
    <div id="reports"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof dailyMatchups === 'undefined') return;

        // 1. Grid Rendering
        const grid = document.getElementById('grid-box');
        dailyMatchups.forEach(m => {
            grid.innerHTML += `
                <div class="matchup-card">
                    <div class="card-header"><span style="font-size:0.65rem; color:var(--text-dim);"><span class="live-dot"></span>${m.time}</span></div>
                    <div class="team-row"><span class="team-abbr">${m.away_abbr}</span><span class="p-name">${m.away_p}</span></div>
                    <div class="vs-divider">VS</div>
                    <div class="team-row"><span class="team-abbr">${m.home_abbr}</span><span class="p-name">${m.home_p}</span></div>
                </div>`;
        });

        // 2. Leaderboard Sorting (Distance)
        const top12 = [...bvpData].sort((a,b) => b.distance - a.distance).slice(0, 12);
        top12.forEach(h => {
            const distLabel = h.distance === 0 ? "0 N/A" : `${h.distance} FT`;
            document.getElementById('leaderboard').innerHTML += `
                <div class="leader-card">
                    <div style="color:var(--accent); font-weight:900; font-size:1.4rem;">${distLabel}</div>
                    <div style="font-weight:700;">${h.batter_name}</div>
                    <div style="font-size:0.75rem; color:var(--text-dim);">vs ${h.pitcher_name} • ${h.launch_speed} MPH</div>
                </div>`;
        });

        // 3. Scouting Reports
        const grouped = bvpData.reduce((acc, h) => {
            acc[h.pitcher_name] = acc[h.pitcher_name] || { opp: h.opponent_team, hits: [] };
            acc[h.pitcher_name].hits.push(h);
            return acc;
        }, {});

        Object.keys(grouped).sort().forEach(p => {
            const data = grouped[p];
            const id = p.replace(/\s+/g, '-');
            document.getElementById('reports').innerHTML += `
                <div class="p-group">
                    <div class="p-header" onclick="document.getElementById('${id}').classList.toggle('hidden')">
                        <strong>${p.toUpperCase()} <small style="color:var(--text-dim); margin-left:10px;">vs ${data.opp}</small></strong>
                        <span style="color:var(--accent); font-weight:800; font-size:0.75rem;">${data.hits.length} ENTRIES</span>
                    </div>
                    <div id="${id}" class="hidden">
                        <table>
                            <thead><tr><th>Batter</th><th>Velo</th><th>Dist</th><th>Date</th></tr></thead>
                            <tbody>
                                ${data.hits.sort((a,b) => b.distance - a.distance).map(h => `
                                    <tr>
                                        <td style="font-weight:700;">${h.batter_name}</td>
                                        <td>${h.launch_speed} MPH</td>
                                        <td style="color:var(--accent); font-weight:800;">${h.distance === 0 ? "0 N/A" : h.distance + " FT"}</td>
                                        <td style="color:var(--text-dim); font-size:0.75rem;">${h.game_date}</td>
                                    </tr>`).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
