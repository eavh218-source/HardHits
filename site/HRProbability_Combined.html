<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HardHits | HR Probability & Results</title>
    <link rel="stylesheet" href="../assets/site-nav.css">
    <script src="../data/hr_model_data.js"></script>
    <script src="../data/hr_results_data.js"></script>
    <script src="../data/historical_index.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: #0f172a;
            --border: #1e293b;
            --accent: #f43f5e;
            --gold: #fbbf24;
            --emerald: #10b981;
            --sky: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #fbbf24;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            line-height: 1.5;
        }

        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-8px); border-color: #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        /* Prediction card styles */
        .elite { border-top: 5px solid var(--accent); }
        .solid { border-top: 5px solid var(--emerald); }

        /* Results card styles */
        .status-hit { border-top: 5px solid var(--success); }
        .status-miss { border-top: 5px solid var(--danger); }
        .status-outlier { border-top: 5px solid var(--warning); }

        .card-header { padding: 24px; display: flex; justify-content: space-between; align-items: flex-start; }
        .team-tag { font-size: 0.65rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .player-name { margin: 4px 0; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }

        .score-box { background: #1e293b; padding: 10px; border-radius: 12px; text-align: center; min-width: 65px; border: 1px solid var(--border); }
        .score-val { display: block; font-size: 1.4rem; font-weight: 900; color: var(--gold); line-height: 1; }
        .score-label { font-size: 0.6rem; color: var(--text-dim); font-weight: 700; margin-top: 4px; }

        .result-badge {
            font-size: 0.65rem;
            font-weight: 900;
            padding: 6px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-hit { background: rgba(34, 197, 94, 0.15); color: var(--success); border: 1px solid var(--success); }
        .badge-miss { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .badge-outlier { background: rgba(251, 191, 36, 0.15); color: var(--warning); border: 1px solid var(--warning); }

        .breakdown-section { padding: 0 24px 20px; }
        .breakdown-title { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; display: block; }

        .breakdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; }
        .b-item { text-align: center; }
        .b-label { font-size: 0.55rem; font-weight: 800; color: var(--text-dim); display: block; margin-bottom: 6px; }
        .b-track { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
        .b-fill { height: 100%; border-radius: 2px; transition: width 1s ease-out; }

        .stats-section { padding: 0 24px 24px; }
        .stat-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); font-weight: 500; }
        .stat-value { font-size: 0.85rem; font-weight: 700; }

        .progress-track { height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; border-radius: 10px; }

        .card-footer {
            background: rgba(0,0,0,0.15);
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; font-weight: 600;
        }
        .trend-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; }
        .hot-trend { background: rgba(244, 63, 94, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .neutral-trend { background: rgba(16, 185, 129, 0.1); color: var(--emerald); border: 1px solid var(--emerald); }

        .park-info { color: var(--sky); text-transform: uppercase; font-size: 0.65rem; }

        /* View toggle */
        .view-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 10px;
        }

        .toggle-btn {
            padding: 12px 24px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text-dim);
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .toggle-btn:hover:not(.active) {
            border-color: var(--text-dim);
            color: var(--text);
        }

        /* Results specific styles */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 16px;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 800;
            display: block;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--gold);
        }

        .player-team {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* Summary bar for results */
        .summary-bar {
            background: var(--card);
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 40px;
            display: flex;
            gap: 25px;
            border: 1px solid var(--border);
            flex-wrap: wrap;
            justify-content: center;
        }

        .summary-item {
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
        }

        .summary-item b {
            color: var(--gold);
            font-size: 1.3rem;
            font-weight: 900;
            display: block;
            margin-top: 4px;
        }

        /* Loading spinner */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body data-nav="hr">

<div class="container">
    <div style="margin-bottom: 30px;">
        <h1 style="font-size: 2.2rem; margin: 0; letter-spacing: -1px;">Home Run Probability</h1>
        <p id="subtitle" style="color: var(--text-dim); margin-top: 5px;">Scoring weight: 20% Power, 15% Form, 10% Trend, 5% Context</p>
    </div>

    <div class="view-toggle">
        <button class="toggle-btn active" id="predictions-btn">Today's Predictions</button>
        <button class="toggle-btn" id="results-btn">Historical Results</button>
    </div>

    <div id="date-selector" style="display: none; margin-bottom: 30px; text-align: center;">
        <select id="date-select" style="padding: 10px 15px; border: 1px solid var(--border); background: var(--card); color: var(--text); border-radius: 8px; font-size: 0.9rem;">
            <option value="">Select Date...</option>
        </select>
        <div id="date-summary" style="margin-top: 15px; color: var(--text-dim); font-size: 0.85rem;"></div>
    </div>

    <div id="summary-container" style="display: none;"></div>

    <div id="dashboard" class="grid">
        <!-- Cards will be loaded here -->
    </div>
</div>

<script>
    let currentView = 'predictions';
    let currentDate = null;

    // View toggle functionality
    document.getElementById('predictions-btn').addEventListener('click', () => {
        setView('predictions');
    });

    document.getElementById('results-btn').addEventListener('click', () => {
        setView('results');
    });

    function setView(view) {
        currentView = view;

        // Update toggle buttons
        document.getElementById('predictions-btn').classList.toggle('active', view === 'predictions');
        document.getElementById('results-btn').classList.toggle('active', view === 'results');

        // Update header
        const title = document.querySelector('h1');
        const subtitle = document.getElementById('subtitle');

        if (view === 'predictions') {
            title.textContent = 'Home Run Probability';
            subtitle.textContent = 'Scoring weight: 20% Power, 15% Form, 10% Trend, 5% Context';
            document.getElementById('summary-container').style.display = 'none';
            document.getElementById('date-selector').style.display = 'none';
            loadPredictions();
        } else {
            title.textContent = 'Probability Results';
            subtitle.textContent = 'Historical model performance by date';
            document.getElementById('summary-container').style.display = 'block';
            document.getElementById('date-selector').style.display = 'block';
            initializeDateSelector();
        }
    }

    function initializeDateSelector() {
        const dateSelect = document.getElementById('date-select');
        const dateSummary = document.getElementById('date-summary');

        // Clear existing options except the first
        while (dateSelect.children.length > 1) {
            dateSelect.removeChild(dateSelect.lastChild);
        }

        // Add available historical dates
        if (typeof historicalDates !== 'undefined') {
            historicalDates.forEach(dateStr => {
                const option = document.createElement('option');
                option.value = dateStr;
                option.textContent = formatDateForDisplay(dateStr);
                dateSelect.appendChild(option);
            });

            // Auto-select yesterday if available
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];

            if (historicalDates.includes(yesterdayStr)) {
                dateSelect.value = yesterdayStr;
                loadResults(yesterdayStr);
            } else if (historicalDates.length > 0) {
                // Select the most recent available date
                dateSelect.value = historicalDates[historicalDates.length - 1];
                loadResults(historicalDates[historicalDates.length - 1]);
            }
        } else {
            dateSummary.textContent = 'No historical data available';
        }

        // Add change listener
        dateSelect.addEventListener('change', (e) => {
            const selectedDate = e.target.value;
            if (selectedDate) {
                loadResults(selectedDate);
            }
        });
    }

    function formatDateForDisplay(dateStr) {
        const date = new Date(dateStr + 'T00:00:00');
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                          'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const month = monthNames[date.getMonth()];
        const day = date.getDate();
        const year = date.getFullYear();
        return `${month} ${day}, ${year}`;
    }

    function formatDate(date) {
        const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                          'July', 'August', 'September', 'October', 'November', 'December'];
        const month = monthNames[date.getMonth()];
        const day = date.getDate();
        const year = date.getFullYear();
        return `${month} ${day}, ${year}`;
    }

    function loadPredictions() {
        const dash = document.getElementById('dashboard');
        dash.innerHTML = '';

        if (typeof hrModelData === 'undefined' || hrModelData.length === 0) {
            dash.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 100px 20px; border: 2px dashed var(--border); border-radius: 30px;">
                <h2 style="color: var(--text-dim)">No Data Found</h2>
                <p>Run <code>python python/hr_engine.py</code> from the repo root to generate <code>data/hr_model_data.js</code>.</p>
            </div>`;
            return;
        }

        hrModelData.forEach(p => {
            const isElite = p.probability >= 8.5;
            const isSolid = p.probability >= 5.5 && p.probability < 8.5;
            const tierClass = isElite ? 'elite' : (isSolid ? 'solid' : '');
            const trendClass = p.ev_trend_val > 1.5 ? 'hot-trend' : 'neutral-trend';

            dash.innerHTML += `
                <article class="card ${tierClass}">
                    <div class="card-header">
                        <div class="header-main">
                            <span class="team-tag">${p.team}</span>
                            <h2 class="player-name">${p.name}</h2>
                            <span class="trend-badge ${trendClass}">${p.ev_trend_label}</span>
                        </div>
                        <div class="score-box">
                            <span class="score-val">${p.probability}%</span>
                            <span class="score-label">PROB</span>
                        </div>
                    </div>

                    <div class="breakdown-section">
                        <span class="breakdown-title">Signal Heatmap</span>
                        <div class="breakdown-grid">
                            <div class="b-item">
                                <span class="b-label">POWER</span>
                                <div class="b-track"><div class="b-fill" style="width:${p.breakdown.Power}%; background: var(--accent);"></div></div>
                            </div>
                            <div class="b-item">
                                <span class="b-label">FORM</span>
                                <div class="b-track"><div class="b-fill" style="width:${p.breakdown.Form}%; background: var(--emerald);"></div></div>
                            </div>
                            <div class="b-item">
                                <span class="b-label">TREND</span>
                                <div class="b-track"><div class="b-fill" style="width:${p.breakdown.Trend}%; background: var(--gold);"></div></div>
                            </div>
                            <div class="b-item">
                                <span class="b-label">PARK</span>
                                <div class="b-track"><div class="b-fill" style="width:${p.breakdown.Park}%; background: var(--sky);"></div></div>
                            </div>
                        </div>
                    </div>

                    <div class="stats-section">
                        <div class="stat-group">
                            <div class="stat-line">
                                <span class="stat-label">Max Exit Velocity</span>
                                <span class="stat-value">${p.max_ev} MPH</span>
                            </div>
                            <div class="progress-track"><div class="progress-fill" style="width:${p.max_ev_pct}%; background: var(--accent);"></div></div>
                        </div>

                        <div class="stat-group" style="margin-top:15px;">
                            <div class="stat-line">
                                <span class="stat-label">Fly Ball EV (Avg)</span>
                                <span class="stat-value">${p.fb_ev} MPH</span>
                            </div>
                            <div class="progress-track"><div class="progress-fill" style="width:${p.fb_ev_pct}%; background: var(--gold);"></div></div>
                        </div>
                    </div>

                    <footer class="card-footer">
                        <div class="pitcher-info">vs <span style="color:white">${p.opp_pitcher}</span></div>
                        <div class="park-info">${p.park_factor}</div>
                    </footer>
                </article>
            `;
        });
    }

    function loadResults(dateStr) {
        currentDate = dateStr;
        const dash = document.getElementById('dashboard');
        const summary = document.getElementById('summary-container');
        const dateSummary = document.getElementById('date-summary');
        const subtitle = document.getElementById('subtitle');

        dash.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 50px;"><div class="loading-spinner"></div><p>Loading historical data...</p></div>';
        summary.innerHTML = '';
        dateSummary.textContent = `Loading data for ${formatDateForDisplay(dateStr)}...`;

        // Update subtitle with selected date
        subtitle.textContent = `${formatDate(new Date(dateStr + 'T00:00:00'))} • v3 Model Performance vs. Statcast Reality`;

        // Load historical data for this date
        loadHistoricalData(dateStr).then(() => {
            // Use the loaded historical data
            const modelData = window[`hrModelData_${dateStr.replace(/-/g, '_')}`] || hrModelData;
            const resultsData = window[`hrResultsData_${dateStr.replace(/-/g, '_')}`] || hrResultsData;

            processResultsData(modelData, resultsData, dash, summary, dateStr);
            dateSummary.textContent = `Showing results for ${formatDateForDisplay(dateStr)}`;
        }).catch(() => {
            // Fallback to current data if historical load fails
            console.log('Using current data as fallback');
            processResultsData(hrModelData, hrResultsData, dash, summary, dateStr);
            dateSummary.textContent = `Showing current data (historical data not available for ${formatDateForDisplay(dateStr)})`;
        });
    }

function processResultsData(modelData, resultsData, dash, summary, dateStr) {
        dash.innerHTML = ''; // Clear loading message

        // 1. Create a Set of names who ACTUALLY hit HRs for fast lookup
        const actualHRNames = new Set(resultsData.map(r => r.name));

        let successfulPredictions = 0;
        let totalFlagged = 0;
        const allCards = [];

        // 2. Map through the Model Predictions
        modelData.forEach(p => {
            const didHit = actualHRNames.has(p.name);
            const isFlagged = p.probability >= 5.0; // Your threshold for a "Pick"

            if (isFlagged) totalFlagged++;
            if (isFlagged && didHit) successfulPredictions++;

            const card = document.createElement('div');
            const status = didHit ? 'win' : 'loss';
            card.className = `card ${didHit ? 'status-hit' : 'status-miss'}`;

            const resultText = didHit ? '✓ WIN' : '✗ LOSS';
            const resultClass = didHit ? 'badge-hit' : 'badge-miss';

            card.innerHTML = `
                <div class="card-header">
                    <div>
                        <span class="team-tag">${p.team}</span>
                        <div class="player-name">${p.name}</div>
                        <div class="player-team">${p.team} • Pred: ${p.probability}%</div>
                    </div>
                    <div class="result-badge ${resultClass}">${resultText}</div>
                </div>

                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-label">Model Prob</div>
                        <div class="stat-value">${p.probability}%</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Max EV</div>
                        <div class="stat-value">${p.max_ev || 'N/A'}</div>
                    </div>
                </div>
            `;
            allCards.push({ element: card, status });
        });

        // 3. Find "Outliers" (Players who hit HRs but weren't in your model's Top list)
        const predictedNames = new Set(modelData.map(p => p.name));
        resultsData.forEach(r => {
            if (!predictedNames.has(r.name)) {
                const card = document.createElement('div');
                card.className = `card status-outlier`;
                card.innerHTML = `
                    <div class="card-header">
                        <div>
                            <div class="player-name">${r.name}</div>
                            <div class="player-team">Actual HR Hit</div>
                        </div>
                        <div class="result-badge badge-outlier">⭐ OUTLIER</div>
                    </div>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-label">Actual EV</div>
                            <div class="stat-value">${r.ev}</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Distance</div>
                            <div class="stat-value">${r.dist}'</div>
                        </div>
                    </div>
                `;
                allCards.push({ element: card, status: 'outlier' });
            }
        });

        // 4. Sort by status: Win -> Outlier -> Loss
        allCards.sort((a, b) => {
            const statusOrder = { 'win': 0, 'outlier': 1, 'loss': 2 };
            return statusOrder[a.status] - statusOrder[b.status];
        });

        // 5. Append sorted cards to dashboard
        allCards.forEach(({ element }) => {
            dash.appendChild(element);
        });

        // 6. Render Summary with date context
        const rate = totalFlagged > 0 ? ((successfulPredictions / totalFlagged) * 100).toFixed(1) : 0;
        const totalHRs = resultsData.length;
        const predictedHRs = successfulPredictions;

        summary.innerHTML = `
            <div class="summary-bar">
                <div class="summary-item">Flagged <b>${totalFlagged}</b></div>
                <div class="summary-item">Hits <b>${successfulPredictions}</b></div>
                <div class="summary-item">Accuracy <b>${rate}%</b></div>
                <div class="summary-item">Total HRs <b>${totalHRs}</b></div>
                <div class="summary-item">Predicted <b>${predictedHRs}/${totalHRs}</b></div>
            </div>
        `;
    }

    // Initialize with predictions view
    document.addEventListener('DOMContentLoaded', () => {
        loadPredictions();
    });
</script>
<script src="../assets/site-nav.js" defer></script>
</body>
</html></content>
