<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚾ HR Results | Accuracy Tracker</title>
    <link rel="stylesheet" href="../assets/site-nav.css">
    <script src="../data/hr_model_data.js"></script>
    <script src="../data/hr_results_data.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #fbbf24;
        }

        .results-page {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            min-height: calc(100vh - 56px);
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { margin-bottom: 5px; letter-spacing: -1px; font-size: 2.5rem; }
        
        #dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .player-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.2s;
        }

        /* Border colors based on success/fail */
        .status-hit { border-left: 6px solid var(--success); box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .status-miss { border-left: 6px solid var(--danger); opacity: 0.8; }
        .status-outlier { border-left: 6px solid var(--warning); } /* HR hit but model didn't predict it */

        .player-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 5px; }
        .result-badge { 
            position: absolute; top: 20px; right: 20px; 
            font-size: 0.7rem; font-weight: 900; padding: 4px 8px; border-radius: 4px; text-transform: uppercase;
        }
        
        .badge-hit { background: var(--success); color: #064e3b; }
        .badge-miss { background: var(--danger); color: #450a0a; }
        .badge-outlier { background: var(--warning); color: #451a03; }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .stat-item {
            background: rgba(15, 23, 42, 0.5);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
        .stat-value { font-size: 1.1rem; font-weight: 900; color: var(--accent); }

        .summary-bar {
            background: var(--card-bg);
            padding: 20px 40px;
            border-radius: 50px;
            margin-bottom: 40px;
            display: flex;
            gap: 30px;
            border: 1px solid var(--border);
        }
        .summary-item b { color: var(--accent); font-size: 1.2rem; }
    </style>
</head>
<body data-nav="results">

    <div class="results-page">
    <div class="header">
        <h1>Accuracy <span style="color:var(--accent)">Ledger</span></h1>
        <p style="color: var(--text-dim)">v3 Model Performance vs. Statcast Reality</p>
    </div>

    <div class="summary-bar" id="summary">
        </div>

    <div id="dashboard">
        </div>
    </div>

    <script>
        function initTracker() {
            const dash = document.getElementById('dashboard');
            const summary = document.getElementById('summary');
            
            // 1. Create a Set of names who ACTUALLY hit HRs for fast lookup
            const actualHRNames = new Set(hrResultsData.map(r => r.name));
            
            let successfulPredictions = 0;
            let totalFlagged = 0;

            // 2. Map through the Model Predictions
            hrModelData.forEach(p => {
                const didHit = actualHRNames.has(p.name);
                const isFlagged = p.probability >= 5.0; // Your threshold for a "Pick"
                
                if (isFlagged) totalFlagged++;
                if (isFlagged && didHit) successfulPredictions++;

                const card = document.createElement('div');
                card.className = `player-card ${didHit ? 'status-hit' : 'status-miss'}`;
                
                card.innerHTML = `
                    <div class="result-badge ${didHit ? 'badge-hit' : 'badge-miss'}">
                        ${didHit ? '🎯 WIN' : '❌ LOSS'}
                    </div>
                    <div class="player-name">${p.name}</div>
                    <div class="player-team">${p.team} • Pred: ${p.probability}%</div>
                    
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-label">Model Prob</div>
                            <div class="stat-value">${p.probability}%</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Max EV</div>
                            <div class="stat-value">${p.max_ev}</div>
                        </div>
                    </div>
                `;
                dash.appendChild(card);
            });

            // 3. Find "Outliers" (Players who hit HRs but weren't in your model's Top list)
            const predictedNames = new Set(hrModelData.map(p => p.name));
            hrResultsData.forEach(r => {
                if (!predictedNames.has(r.name)) {
                    const card = document.createElement('div');
                    card.className = `player-card status-outlier`;
                    card.innerHTML = `
                        <div class="result-badge badge-outlier">🔭 OUTLIER</div>
                        <div class="player-name">${r.name}</div>
                        <div class="player-team">Actual HR Hit</div>
                        <div class="stat-grid">
                            <div class="stat-item">
                                <div class="stat-label">Actual EV</div>
                                <div class="stat-value">${r.ev}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">Distance</div>
                                <div class="stat-value">${r.dist}'</div>
                            </div>
                        </div>
                    `;
                    dash.prepend(card); // Put outliers at the top to investigate
                }
            });

            // 4. Render Summary
            const rate = totalFlagged > 0 ? ((successfulPredictions / totalFlagged) * 100).toFixed(1) : 0;
            summary.innerHTML = `
                <div class="summary-item">Flagged: <b>${totalFlagged}</b></div>
                <div class="summary-item">Hits: <b>${successfulPredictions}</b></div>
                <div class="summary-item">Accuracy: <b style="color:var(--success)">${rate}%</b></div>
            `;
        }

        window.onload = initTracker;
    </script>
    <script src="../assets/site-nav.js" defer></script>
</body>
</html>
