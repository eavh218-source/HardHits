<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Homers | HardHits</title>
    <link rel="stylesheet" href="../assets/site-nav.css">
    <script src="../data/todays_hrs.js"></script>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-bg: #111827;
            --border: #1e293b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #38bdf8; 
            --danger: #f87171;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        .header { border-left: 5px solid var(--accent); padding-left: 20px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 12px; overflow: hidden; }
        th { text-align: left; background: #1e293b; color: var(--text-muted); padding: 15px; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); }
        .dist-large { font-weight: 800; font-size: 1.2rem; color: #fff; }
        .angle-badge { background: #0f172a; padding: 4px 8px; border-radius: 6px; color: var(--accent); font-weight: 700; }
        .team-tag { font-size: 0.65rem; color: var(--text-muted); border: 1px solid var(--border); padding: 2px 5px; border-radius: 4px; margin-left: 5px; text-transform: uppercase; }
    </style>
</head>
<body data-nav="daily">

<div class="container">
    <div class="header">
        <h1 style="margin:0;">DAILY HOMER RECAP</h1>
        <p id="date-label" style="color:var(--text-muted); margin:5px 0 0 0;"></p>
    </div>

    <table>
        <thead>
            <tr><th>Batter</th><th>Pitcher</th><th>Exit Velo</th><th>Launch Angle</th><th>Distance</th></tr>
        </thead>
        <tbody id="hr-body"></tbody>
    </table>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof todaysHRData === 'undefined' || todaysHRData.length === 0) {
            document.getElementById('hr-body').innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px; color:var(--text-muted);">No home runs recorded for this date yet.</td></tr>';
            return;
        }

        document.getElementById('date-label').innerText = `Statcast Live Feed: ${hrUpdateDate}`;
        const body = document.getElementById('hr-body');
        const sorted = [...todaysHRData].sort((a,b) => b.distance - a.distance);

        sorted.forEach(hr => {
            body.innerHTML += `
                <tr>
                    <td><div style="font-weight:700;">${hr.batter}</div><span class="team-tag">${hr.batter_team}</span></td>
                    <td><div style="font-size:0.9rem;">${hr.pitcher}</div><span class="team-tag">${hr.pitcher_team}</span></td>
                    <td style="color:var(--danger); font-weight:800;">${hr.exit_velo} MPH</td>
                    <td><span class="angle-badge">${hr.launch_angle}°</span></td>
                    <td class="dist-large">${hr.distance} FT</td>
                </tr>`;
        });
    });
</script>
<script src="../assets/site-nav.js" defer></script>
</body>
</html>
