<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HardHits | HR Probability</title>
    <link rel="stylesheet" href="../assets/site-nav.css?v=stable-20260406-admingear">
    <script src="../data/hr_model_data.js?v=stable-20260406-livefix"></script>
    <script src="../data/mlb_weather.js?v=stable-20260407-ballparks"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: #0f172a;
            --border: #1e293b;
            --accent: #f43f5e;
            --gold: #fbbf24;
            --emerald: #10b981;
            --sky: #38bdf8;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            line-height: 1.5;
        }

        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }

        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .card:hover { transform: translateY(-8px); border-color: #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .card--interactive { cursor: pointer; }
        .card--interactive:focus-visible { outline: 2px solid var(--sky); outline-offset: 2px; }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.82);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 3000;
        }

        .modal-backdrop.is-open { display: flex; }

        .modal-card {
            width: min(760px, 100%);
            max-height: 85vh;
            overflow-y: auto;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(8, 12, 21, 0.98));
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
            padding: 22px;
        }

        .modal-close {
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.85);
            color: var(--text);
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 800;
            cursor: pointer;
            margin-left: auto;
            display: block;
        }

        .modal-close:hover { border-color: #475569; }

        .modal-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin: 10px 0 18px;
        }

        .modal-title { margin: 6px 0; font-size: 1.6rem; }
        .modal-subtitle { color: var(--text-dim); font-size: 0.88rem; }

        .modal-section {
            margin-top: 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            background: rgba(2, 6, 23, 0.42);
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .modal-context-layout {
            display: grid;
            grid-template-columns: minmax(0, 1.15fr) minmax(240px, 0.85fr);
            gap: 16px;
            align-items: start;
            margin-top: 16px;
        }

        .modal-context-layout .modal-section {
            margin-top: 0;
        }

        .modal-ballpark-panel img {
            display: block;
            width: 100%;
            max-width: 240px;
            border-radius: 14px;
            border: 1px solid var(--border);
            margin: 0 0 12px;
            background: #081120;
        }

        .weather-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .weather-pill {
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(15, 23, 42, 0.72);
            padding: 8px 10px;
        }

        .weather-pill-label {
            display: block;
            font-size: 0.62rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 3px;
        }

        .stat-pill {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.78);
            padding: 10px 12px;
        }

        .stat-pill-label {
            display: block;
            font-size: 0.68rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-pill-value {
            font-size: 0.92rem;
            font-weight: 800;
            color: var(--text);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 8px 0;
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .detail-row strong {
            color: var(--text);
            text-align: right;
        }

        .elite { border-top: 5px solid var(--accent); }
        .solid { border-top: 5px solid var(--emerald); }

        .card-header { padding: 24px; display: flex; justify-content: space-between; align-items: flex-start; }
        .team-tag { font-size: 0.65rem; font-weight: 900; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .player-name { margin: 4px 0; font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }

        .score-box { background: #1e293b; padding: 10px; border-radius: 12px; text-align: center; min-width: 65px; border: 1px solid var(--border); }
        .score-val { display: block; font-size: 1.4rem; font-weight: 900; color: var(--gold); line-height: 1; }
        .score-label { font-size: 0.6rem; color: var(--text-dim); font-weight: 700; margin-top: 4px; }

        .breakdown-section { padding: 0 24px 20px; }
        .breakdown-title { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 12px; display: block; }
        
        .breakdown-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; }
        .b-item { text-align: center; }
        .b-label { font-size: 0.55rem; font-weight: 800; color: var(--text-dim); display: block; margin-bottom: 6px; }
        .b-track { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
        .b-fill { height: 100%; border-radius: 2px; transition: width 1s ease-out; }

        .stats-section { padding: 0 24px 24px; }
        .stat-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .stat-label { font-size: 0.8rem; color: var(--text-dim); font-weight: 500; }
        .stat-value { font-size: 0.85rem; font-weight: 700; }
        
        .progress-track { height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; border-radius: 10px; }

        .card-footer { 
            background: rgba(0,0,0,0.15); 
            padding: 16px 24px; 
            border-top: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; font-weight: 600;
        }
        .trend-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.65rem; font-weight: 800; }
        .hot-trend { background: rgba(244, 63, 94, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .neutral-trend { background: rgba(16, 185, 129, 0.1); color: var(--emerald); border: 1px solid var(--emerald); }

        .park-info { color: var(--sky); text-transform: uppercase; font-size: 0.65rem; }

        @media (max-width: 720px) {
            .modal-context-layout {
                grid-template-columns: 1fr;
            }

            .modal-ballpark-panel img {
                max-width: 100%;
            }
        }
    </style>
</head>
<body data-nav="hr">

<div class="container">
    <div style="margin-bottom: 30px;">
        <h1 style="font-size: 2.2rem; margin: 0; letter-spacing: -1px;">Home Run Probability</h1>
        <p style="color: var(--text-dim); margin-top: 5px;">Unified model: power, form, EV trend, pitcher risk, park, platoon, H2H, weather + lineup PA multiplier</p>
        <p style="color: var(--gold); margin: 8px 0 0; font-size: 0.9rem; font-weight: 700;">Click any player card for a deeper breakdown.</p>
    </div>

    <div id="dashboard" class="grid"></div>
</div>

<div id="player-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="player-modal-title">
        <button id="close-player-modal" class="modal-close" type="button">Close</button>
        <div id="player-modal-content"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const dash = document.getElementById('dashboard');
        const modal = document.getElementById('player-modal');
        const modalContent = document.getElementById('player-modal-content');
        const closeModalBtn = document.getElementById('close-player-modal');

        function safeText(value) {
            return String(value ?? '').replace(/[&<>"']/g, function (char) {
                return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char] || char;
            });
        }

        function formatMetric(value, suffix = '') {
            const numericValue = Number(value);
            return Number.isFinite(numericValue) ? `${numericValue}${suffix}` : 'N/A';
        }

        const weatherRows = (typeof mlbWeatherData !== 'undefined' && Array.isArray(mlbWeatherData)) ? mlbWeatherData : [];

        function slugify(value) {
            return String(value ?? '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '') || 'ballpark';
        }

        function getBallparkContext(player) {
            if (!player || !weatherRows.length) {
                return null;
            }

            const playerDate = String(player.date || '').slice(0, 10);
            const teamCode = String(player.team || '').trim().toUpperCase();

            return weatherRows.find((row) => {
                const rowDate = String(row.date || '').slice(0, 10);
                const away = String(row.away_abbr || '').toUpperCase();
                const home = String(row.home_abbr || '').toUpperCase();
                return rowDate === playerDate && (away === teamCode || home === teamCode);
            }) || null;
        }

        function renderBallparkSection(player) {
            const context = getBallparkContext(player);
            const venue = (context && context.venue) || player.ballpark_name || 'Ballpark TBD';
            const firstPitch = context && context.game_time_et ? String(context.game_time_et) : '';
            const imageSrc = context && context.venue
                ? `../assets/generated/covers/ballparks/${slugify(context.venue)}.png`
                : '';
            const temp = context ? formatMetric(context.temperature_f, '°F') : 'N/A';
            const wind = context ? `${formatMetric(context.wind_mph, ' mph')} ${context.wind_direction || ''}`.trim() : 'N/A';
            const humidity = context ? formatMetric(context.humidity_pct, '%') : 'N/A';
            const rain = context ? formatMetric(context.precip_pct, '%') : 'N/A';
            const cfCompass = context && context.center_field_direction ? String(context.center_field_direction) : 'N/A';
            const windOutlook = context && context.wind_outlook ? String(context.wind_outlook) : 'Lookup pending';

            return `
                <div class="modal-section modal-ballpark-panel">
                    <div class="breakdown-title">Ballpark</div>
                    ${imageSrc ? `<img src="${safeText(imageSrc)}" alt="${safeText(venue)}" onerror="this.style.display='none'">` : ''}
                    ${detailRow('Venue', String(venue))}
                    ${firstPitch ? detailRow('First Pitch', firstPitch) : ''}
                    ${detailRow('CF Compass', cfCompass)}
                    ${detailRow('Wind Outlook', windOutlook)}
                    ${detailRow('Park', String(player.park_factor || 'Neutral'))}
                    ${detailRow('Weather Score', formatMetric(player.weather_boost, '%'))}
                    <div class="weather-grid">
                        ${weatherPill('Temp', temp)}
                        ${weatherPill('Wind', wind)}
                        ${weatherPill('Humidity', humidity)}
                        ${weatherPill('Rain', rain)}
                    </div>
                </div>
            `;
        }

        function detailRow(label, value) {
            return `<div class="detail-row"><span>${safeText(label)}</span><strong>${safeText(value)}</strong></div>`;
        }

        function statPill(label, value) {
            return `<div class="stat-pill"><span class="stat-pill-label">${safeText(label)}</span><span class="stat-pill-value">${safeText(value)}</span></div>`;
        }

        function weatherPill(label, value) {
            return `<div class="weather-pill"><span class="weather-pill-label">${safeText(label)}</span><strong>${safeText(value)}</strong></div>`;
        }

        function closeModal() {
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        function openPlayerModal(player) {
            const breakdown = player.breakdown || {};
            const opponent = player.opp_pitcher_full || player.opp_pitcher || 'TBD';

            modalContent.innerHTML = `
                <div class="modal-header">
                    <div>
                        <div class="team-tag">${safeText(player.team || 'TBD')}</div>
                        <h2 id="player-modal-title" class="modal-title">${safeText(player.name || 'Unknown')}</h2>
                        <div class="modal-subtitle">Detailed HR model lookup vs ${safeText(opponent)}</div>
                    </div>
                    <div class="score-box">
                        <span class="score-val">${safeText(String(player.probability ?? 'N/A'))}%</span>
                        <span class="score-label">HR PROB</span>
                    </div>
                </div>

                <div class="modal-section">
                    <div class="breakdown-title">Power Snapshot</div>
                    <div class="modal-grid">
                        ${statPill('Max EV', formatMetric(player.max_ev, ' MPH'))}
                        ${statPill('Fly Ball EV', formatMetric(player.fb_ev, ' MPH'))}
                        ${statPill('Barrel %', formatMetric(player.barrel_pct, '%'))}
                        ${statPill('EV Trend', player.ev_trend_label || 'Stable')}
                    </div>
                </div>

                <div class="modal-context-layout">
                    <div class="modal-section">
                        <div class="breakdown-title">Game Context</div>
                        ${detailRow('Trend', String(player.ev_trend_label || 'Stable'))}
                        ${detailRow('Lineup', `${String(player.lineup_slot || 'TBD')} • ${String(player.lineup_status || 'Pending')}`)}
                        ${detailRow('Expected PA', String(player.expected_pa || 'N/A'))}
                        ${detailRow('Pitcher HR Risk', formatMetric(player.pitcher_hr_risk, '%'))}
                        ${detailRow('Pitcher HR/9', formatMetric(player.pitcher_hr9))}
                        ${detailRow('Pitcher FB Rate', formatMetric(player.pitcher_fb_rate, '%'))}
                        ${detailRow('Platoon Edge', formatMetric(player.platoon_advantage, '%'))}
                        ${detailRow('BvP', String(player.bvp_summary || 'No batter-vs-pitcher note available.'))}
                    </div>
                    ${renderBallparkSection(player)}
                </div>

                <div class="modal-section">
                    <div class="breakdown-title">Model Signals</div>
                    ${detailRow('Power Score', `${breakdown.Power ?? 'N/A'} / 100`)}
                    ${detailRow('Form Score', `${breakdown.Form ?? 'N/A'} / 100`)}
                    ${detailRow('Trend Score', `${breakdown.Trend ?? 'N/A'} / 100`)}
                    ${detailRow('Park Score', `${breakdown.Park ?? 'N/A'} / 100`)}
                    ${detailRow('Pitcher Score', `${breakdown.Pitcher ?? 'N/A'} / 100`)}
                    ${detailRow('Platoon Score', `${breakdown.Platoon ?? 'N/A'} / 100`)}
                    ${detailRow('Weather Score', `${breakdown.Weather ?? 'N/A'} / 100`)}
                </div>
            `;

            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            closeModalBtn.focus();
        }

        function getPlayerFromCard(card) {
            const index = Number(card.getAttribute('data-player-index'));
            return Number.isInteger(index) && hrModelData[index] ? hrModelData[index] : null;
        }

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (event) => {
            if (event.target === modal) {
                closeModal();
            }
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        if (typeof hrModelData === 'undefined' || hrModelData.length === 0) {
            dash.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 100px 20px; border: 2px dashed var(--border); border-radius: 30px;">
                <h2 style="color: var(--text-dim)">No Data Found</h2>
                <p>Run <code>python python/hr_engine.py</code> from the repo root to generate <code>data/hr_model_data.js</code>.</p>
            </div>`;
            return;
        }

        dash.innerHTML = hrModelData.map((p, index) => {
            const isElite = p.probability >= 8.5;
            const isSolid = p.probability >= 5.5 && p.probability < 8.5;
            const tierClass = isElite ? 'elite' : (isSolid ? 'solid' : '');
            const trendClass = p.ev_trend_val > 1.5 ? 'hot-trend' : 'neutral-trend';

            return `
                <article class="card card--interactive ${tierClass}" data-player-index="${index}" tabindex="0" role="button" aria-label="Open HR details for ${safeText(p.name)}" title="Click for full player breakdown">
                    <div class="card-header">
                        <div class="header-main">
                            <span class="team-tag">${safeText(p.team)}</span>
                            <h2 class="player-name">${safeText(p.name)}</h2>
                            <span class="trend-badge ${trendClass}">${safeText(p.ev_trend_label)}</span>
                        </div>
                        <div class="score-box">
                            <span class="score-val">${safeText(String(p.probability))}%</span>
                            <span class="score-label">PROB</span>
                        </div>
                    </div>

                    <div class="breakdown-section">
                        <span class="breakdown-title">Signal Heatmap</span>
                        <div class="breakdown-grid">
                            <div class="b-item">
                                <span class="b-label">POWER</span>
                                <div class="b-track"><div class="b-fill" style="width:${p.breakdown.Power}%; background: var(--accent);"></div></div>
                            </div>
                            <div class="b-item">
                                <span class="b-label">FORM</span>
                                <div class="b-track"><div class="b-fill" style="width:${p.breakdown.Form}%; background: var(--emerald);"></div></div>
                            </div>
                            <div class="b-item">
                                <span class="b-label">TREND</span>
                                <div class="b-track"><div class="b-fill" style="width:${p.breakdown.Trend}%; background: var(--gold);"></div></div>
                            </div>
                            <div class="b-item">
                                <span class="b-label">PARK</span>
                                <div class="b-track"><div class="b-fill" style="width:${p.breakdown.Park}%; background: var(--sky);"></div></div>
                            </div>
                        </div>
                    </div>

                    <div class="stats-section">
                        <div class="stat-group">
                            <div class="stat-line">
                                <span class="stat-label">Max Exit Velocity</span>
                                <span class="stat-value">${safeText(formatMetric(p.max_ev, ' MPH'))}</span>
                            </div>
                            <div class="progress-track"><div class="progress-fill" style="width:${p.max_ev_pct}%; background: var(--accent);"></div></div>
                        </div>

                        <div class="stat-group" style="margin-top:15px;">
                            <div class="stat-line">
                                <span class="stat-label">Fly Ball EV (Avg)</span>
                                <span class="stat-value">${safeText(formatMetric(p.fb_ev, ' MPH'))}</span>
                            </div>
                            <div class="progress-track"><div class="progress-fill" style="width:${p.fb_ev_pct}%; background: var(--gold);"></div></div>
                        </div>
                    </div>

                    <footer class="card-footer">
                        <div class="pitcher-info">vs <span style="color:white">${safeText(p.opp_pitcher || 'TBD')}</span></div>
                        <div class="park-info">${safeText(p.park_factor || 'Neutral')}</div>
                    </footer>
                </article>
            `;
        }).join('');

        Array.from(dash.querySelectorAll('.card--interactive')).forEach((card) => {
            card.addEventListener('click', () => {
                const player = getPlayerFromCard(card);
                if (player) {
                    openPlayerModal(player);
                }
            });

            card.addEventListener('keydown', (event) => {
                if (event.key !== 'Enter' && event.key !== ' ') {
                    return;
                }

                event.preventDefault();
                const player = getPlayerFromCard(card);
                if (player) {
                    openPlayerModal(player);
                }
            });
        });
    });
</script>
<script src="../assets/site-nav.js?v=stable-20260406-admingear" defer></script>
</body>
</html>
