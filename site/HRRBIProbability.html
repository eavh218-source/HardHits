<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HardHits | MLB HRR+ (Hits + Runs + RBIs) Probability Model</title>
    <link rel="stylesheet" href="../assets/site-nav.css?v=stable-20260406-admingear">
    <script src="../data/hrbi_model_data.js?v=stable-20260406-hrbiresults"></script>
    <script src="../data/hrbi_results_data.js?v=stable-20260406-hrbiresults"></script>
    <script src="../data/hrbi_results_index.js?v=stable-20260406-hrbiresults"></script>
    <script src="../assets/hardhits-api.js?v=stable-20260406-api"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: #0f172a;
            --card-soft: #111827;
            --border: #1e293b;
            --accent: #f43f5e;
            --accent-2: #38bdf8;
            --emerald: #10b981;
            --orange: #fb7185;
            --gold: #fbbf24;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            line-height: 1.5;
            background:
                radial-gradient(circle at top, rgba(244, 63, 94, 0.12), transparent 0, transparent 38%),
                radial-gradient(circle at right top, rgba(56, 189, 248, 0.12), transparent 0, transparent 30%),
                var(--bg);
            color: var(--text);
        }

        .container { max-width: 1400px; margin: 40px auto; padding: 0 20px 32px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }

        .card {
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(9, 13, 24, 0.98));
            border: 1px solid var(--border);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.26);
        }

        .high { border-top: 5px solid #a855f7; }
        .std { border-top: 5px solid var(--accent); }
        .watch { border-top: 5px solid var(--accent-2); }

        .card-header { padding: 20px; display: flex; justify-content: space-between; gap: 14px; }
        .player-name { margin: 6px 0; font-size: 1.3rem; }
        .team-tag { color: var(--accent); font-size: 0.7rem; font-weight: 900; letter-spacing: .08em; }

        .score-box {
            min-width: 84px;
            text-align: center;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px;
            background: rgba(15, 23, 42, 0.85);
        }
        .score-val { font-size: 1.5rem; font-weight: 900; color: var(--gold); display: block; line-height: 1; }
        .score-label { font-size: 0.62rem; color: var(--text-dim); font-weight: 700; letter-spacing: .08em; }

        .band {
            display: inline-flex;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.65rem;
            font-weight: 800;
            background: rgba(244, 63, 94, 0.12);
            color: #fecdd3;
            border: 1px solid rgba(244, 63, 94, 0.28);
        }

        .section { padding: 0 20px 18px; }
        .title { font-size: 0.72rem; color: var(--text-dim); font-weight: 800; margin-bottom: 10px; text-transform: uppercase; }

        .breakdown-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .b-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px;
            background: rgba(15, 23, 42, 0.55);
        }
        .b-label { font-size: 0.62rem; color: var(--text-dim); font-weight: 800; display: block; margin-bottom: 6px; }
        .track { height: 6px; background: #334155; border-radius: 8px; overflow: hidden; }
        .fill { height: 100%; background: linear-gradient(90deg, var(--accent-2), var(--accent)); }

        .detail-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin: 8px 0;
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .detail-row strong {
            color: var(--text);
            text-align: right;
        }

        .footer {
            border-top: 1px solid var(--border);
            background: rgba(2, 6, 23, 0.45);
            padding: 14px 20px;
            font-size: 0.74rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .card--interactive {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .card--interactive:hover {
            transform: translateY(-4px);
            border-color: #334155;
            box-shadow: 0 22px 40px rgba(0, 0, 0, 0.34);
        }

        .card--interactive:focus-visible {
            outline: 2px solid var(--accent-2);
            outline-offset: 2px;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 3000;
        }

        .modal-backdrop.is-open {
            display: flex;
        }

        .modal-card {
            width: min(760px, 100%);
            max-height: 85vh;
            overflow-y: auto;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.98), rgba(8, 12, 21, 0.98));
            border-radius: 18px;
            border: 1px solid var(--border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
            padding: 22px;
        }

        .modal-close {
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.85);
            color: var(--text);
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 800;
            cursor: pointer;
            margin-left: auto;
            display: block;
        }

        .modal-close:hover {
            border-color: #475569;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin: 10px 0 18px;
        }

        .modal-title {
            margin: 6px 0;
            font-size: 1.6rem;
        }

        .modal-subtitle {
            color: var(--text-dim);
            font-size: 0.88rem;
        }

        .modal-section {
            margin-top: 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            background: rgba(2, 6, 23, 0.42);
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .stat-pill {
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.78);
            padding: 10px 12px;
        }

        .stat-pill-label {
            display: block;
            font-size: 0.68rem;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-pill-value {
            font-size: 0.92rem;
            font-weight: 800;
            color: var(--text);
        }

        .view-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 0 0 24px;
            flex-wrap: wrap;
        }

        .toggle-btn {
            padding: 12px 20px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.88);
            color: var(--text-dim);
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 700;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, var(--accent), #ec4899);
            color: #fff;
            border-color: transparent;
        }

        .toggle-btn:hover:not(.active) {
            border-color: #475569;
            color: var(--text);
        }

        .summary-bar {
            background: rgba(15, 23, 42, 0.88);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px 20px;
            margin: 0 0 24px;
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .summary-item {
            font-size: 0.82rem;
            color: var(--text-dim);
            font-weight: 700;
            min-width: 110px;
            text-align: center;
        }

        .summary-item b {
            display: block;
            margin-top: 4px;
            font-size: 1.15rem;
            color: var(--gold);
        }

        .result-win { border-top: 5px solid var(--emerald); }
        .result-loss { border-top: 5px solid #ef4444; }
        .result-outlier { border-top: 5px solid var(--gold); }

        .results-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.68rem;
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .badge-win {
            color: #bbf7d0;
            background: rgba(16, 185, 129, 0.18);
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .badge-loss {
            color: #fecaca;
            background: rgba(239, 68, 68, 0.18);
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .badge-outlier {
            color: #fde68a;
            background: rgba(251, 191, 36, 0.18);
            border: 1px solid rgba(251, 191, 36, 0.4);
        }

        .empty-state {
            grid-column: 1/-1;
            padding: 60px;
            text-align: center;
            border: 2px dashed #334155;
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.92);
            color: #f8fafc;
        }
    </style>
</head>
<body data-nav="hrbi">
<div class="container">
    <div style="margin-bottom: 26px;">
        <h1 id="page-title" style="margin:0; font-size:2rem; letter-spacing:-0.02em;">MLB HRR+ (Hits + Runs + RBIs) Probability Model</h1>
        <p id="subtitle" style="margin:6px 0 0; color:var(--text-dim);">Target condition: player records 3+ combined HRR+ / Hits + Runs + RBIs.</p>
    </div>

    <div class="view-toggle">
        <button class="toggle-btn active" id="predictions-btn" type="button">Today's Predictions</button>
        <button class="toggle-btn" id="results-btn" type="button">Verification / Historical Results</button>
    </div>

    <div id="date-selector" style="display:none; margin-bottom:24px; text-align:center;">
        <select id="date-select" style="padding:10px 15px; border:1px solid var(--border); background:rgba(15,23,42,0.9); color:var(--text); border-radius:10px; font-size:0.9rem;">
            <option value="">Select Date...</option>
        </select>
        <div id="date-summary" style="margin-top:12px; color:var(--text-dim); font-size:0.84rem;"></div>
    </div>

    <div id="summary-container" style="display:none;"></div>
    <div id="dashboard" class="grid"></div>
</div>

<div id="player-modal" class="modal-backdrop" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Player stat lookup">
        <button id="player-modal-close" class="modal-close" type="button">Close</button>
        <div id="player-modal-content"></div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const dash = document.getElementById('dashboard');
        const modal = document.getElementById('player-modal');
        const modalContent = document.getElementById('player-modal-content');
        const closeBtn = document.getElementById('player-modal-close');
        const subtitle = document.getElementById('subtitle');
        const pageTitle = document.getElementById('page-title');
        const summaryContainer = document.getElementById('summary-container');
        const dateSelector = document.getElementById('date-selector');
        const dateSelect = document.getElementById('date-select');
        const dateSummary = document.getElementById('date-summary');
        const predictionsBtn = document.getElementById('predictions-btn');
        const resultsBtn = document.getElementById('results-btn');

        let sourcePlayers = typeof hrbiModelData !== 'undefined' ? hrbiModelData : window.hrbiModelData;
        let players = Array.isArray(sourcePlayers) ? sourcePlayers : [];
        let latestResultsSource = typeof hrbiResultsData !== 'undefined' ? hrbiResultsData : window.hrbiResultsData;
        let latestResults = Array.isArray(latestResultsSource) ? latestResultsSource : [];
        let latestSummarySource = typeof hrbiResultsSummary !== 'undefined' ? hrbiResultsSummary : window.hrbiResultsSummary;
        let latestSummary = latestSummarySource && typeof latestSummarySource === 'object' ? latestSummarySource : null;
        let historicalDateSource = typeof hrbiHistoricalDates !== 'undefined' && Array.isArray(hrbiHistoricalDates)
            ? hrbiHistoricalDates
            : (latestSummary && latestSummary.date ? [latestSummary.date] : []);
        let historicalDates = historicalDateSource
            .filter((value, index, arr) => value && arr.indexOf(value) === index)
            .sort((a, b) => b.localeCompare(a));
        const hardHitsApi = window.HardHitsApi || null;

        function inferApiRunTime(items) {
            if (!hardHitsApi || !Array.isArray(items)) {
                return '';
            }

            const imported = items
                .map(item => item && item.imported_at_utc)
                .filter(Boolean)
                .sort()
                .pop();

            return imported ? hardHitsApi.formatEtTime(imported) : '';
        }

        async function bootstrapApiData() {
            if (!hardHitsApi) {
                return false;
            }

            try {
                const todayStr = hardHitsApi.easternDateString(0);
                const meta = await hardHitsApi.fetchJson('/api/meta');
                const latestResultsDate = (meta && meta.latest_hrbi_results_date) || todayStr;
                const [predictionPayload, resultsPayload, summaryPayload, datesPayload] = await Promise.all([
                    hardHitsApi.fetchJson(`/api/hrbi/predictions?date=${encodeURIComponent(todayStr)}&limit=500`),
                    hardHitsApi.fetchJson(`/api/hrbi/results?date=${encodeURIComponent(latestResultsDate)}`),
                    hardHitsApi.fetchJson(`/api/hrbi/summary?date=${encodeURIComponent(latestResultsDate)}`),
                    hardHitsApi.fetchJson('/api/hrbi/dates'),
                ]);

                if (predictionPayload && Array.isArray(predictionPayload.items)) {
                    players = predictionPayload.items;
                    window.hrbiModelData = players;
                    window.hrbiModelUpdateDate = predictionPayload.date || todayStr;
                    const lastRunTime = inferApiRunTime(players);
                    if (lastRunTime) {
                        window.hrbiModelLastRunTime = lastRunTime;
                    }
                }

                if (resultsPayload && Array.isArray(resultsPayload.items)) {
                    latestResults = resultsPayload.items;
                    window.hrbiResultsData = latestResults;
                }

                if (summaryPayload && typeof summaryPayload === 'object') {
                    latestSummary = summaryPayload;
                    window.hrbiResultsSummary = latestSummary;
                }

                if (datesPayload && Array.isArray(datesPayload.dates)) {
                    historicalDates = datesPayload.dates
                        .filter((value, index, arr) => value && arr.indexOf(value) === index)
                        .sort((a, b) => b.localeCompare(a));
                    window.hrbiHistoricalDates = historicalDates;
                }

                return players.length > 0 || latestResults.length > 0;
            } catch (error) {
                console.warn('HardHits API unavailable, using static HRR+ bundle:', error);
                return false;
            }
        }

        function formatLongDate(dateStr) {
            if (!dateStr) {
                return '';
            }
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
        }

        function formatPercent(value) {
            const numericValue = Number(value);
            return Number.isFinite(numericValue) ? (numericValue * 100).toFixed(1) + '%' : '0.0%';
        }

        function escapeHtml(value) {
            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function signalBlock(label, value) {
            const safeVal = Math.max(0, Math.min(100, value || 0));
            return '<div class="b-item">' +
                '<span class="b-label">' + label + '</span>' +
                '<div class="track"><div class="fill" style="width:' + safeVal + '%"></div></div>' +
            '</div>';
        }

        function detailRow(label, value) {
            return '<div class="detail-row"><span>' + escapeHtml(label) + '</span><strong>' + escapeHtml(value) + '</strong></div>';
        }

        function statPill(label, value) {
            return '<div class="stat-pill">' +
                '<span class="stat-pill-label">' + escapeHtml(label) + '</span>' +
                '<span class="stat-pill-value">' + escapeHtml(value) + '</span>' +
            '</div>';
        }

        function normalizeKey(value) {
            return String(value == null ? '' : value).trim().toLowerCase();
        }

        function formatMetric(value, suffix) {
            const numericValue = Number(value);
            return Number.isFinite(numericValue) ? String(numericValue) + (suffix || '') : 'N/A';
        }

        function buildPredictionSubtitle() {
            const modelDate = (typeof hrbiModelUpdateDate !== 'undefined' && hrbiModelUpdateDate)
                ? hrbiModelUpdateDate
                : (players[0] && players[0].date ? players[0].date : '');
            const lastRunTime = typeof hrbiModelLastRunTime !== 'undefined' ? hrbiModelLastRunTime : '';
            const subtitleParts = [];
            if (modelDate) {
                subtitleParts.push('Updated for ' + formatLongDate(modelDate));
            }
            if (lastRunTime) {
                subtitleParts.push('Last run ' + lastRunTime);
            }
            subtitleParts.push('Target condition: player records 3+ combined HRR+ / Hits + Runs + RBIs.');
            return subtitleParts.join(' • ');
        }

        function buildResultsSubtitle(dateStr) {
            const prefix = dateStr ? formatLongDate(dateStr) : 'Latest completed slate';
            return prefix + ' • Verification against actual H+R+RBI totals (3+)';
        }

        function buildFallbackSummary(rows, dateStr) {
            const summary = { date: dateStr || '', wins: 0, losses: 0, outliers: 0, precision: 0, recall: 0, f1_score: 0 };
            (rows || []).forEach(function (row) {
                if (row.classification === 'Win') {
                    summary.wins += 1;
                } else if (row.classification === 'Loss') {
                    summary.losses += 1;
                } else if (row.classification === 'Outlier') {
                    summary.outliers += 1;
                }
            });
            const precision = (summary.wins + summary.losses) ? summary.wins / (summary.wins + summary.losses) : 0;
            const recall = (summary.wins + summary.outliers) ? summary.wins / (summary.wins + summary.outliers) : 0;
            const f1 = (precision + recall) ? (2 * precision * recall / (precision + recall)) : 0;
            summary.precision = precision;
            summary.recall = recall;
            summary.f1_score = f1;
            return summary;
        }

        function getPlayerFromCard(card) {
            const index = Number(card.getAttribute('data-player-index'));
            if (Number.isInteger(index) && players[index]) {
                return players[index];
            }

            const playerName = normalizeKey(card.getAttribute('data-player-name'));
            const playerTeam = normalizeKey(card.getAttribute('data-player-team'));

            return players.find(function (candidate) {
                return normalizeKey(candidate.name) === playerName && normalizeKey(candidate.team) === playerTeam;
            }) || null;
        }

        function closeModal() {
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
            document.body.style.overflow = '';
        }

        function openModal(player) {
            const showPitcherHistory = Number(player.vs_starter_ab || 0) > 0;
            const lastFiveSummary = Number(player.last_5_ab || 0) > 0
                ? (player.last_5_avg_display || 'N/A') + ' (' + (player.last_5_hits || 0) + ' H / ' + (player.last_5_ab || 0) + ' AB)'
                : (player.last_5_avg_display || 'N/A');

            modalContent.innerHTML =
                '<div class="modal-header">' +
                    '<div>' +
                        '<div class="team-tag">' + escapeHtml(player.team || 'TBD') + '</div>' +
                        '<h2 class="modal-title">' + escapeHtml(player.name || 'Unknown') + '</h2>' +
                        '<div class="modal-subtitle">Detailed lookup for ' + escapeHtml(player.opp_pitcher || 'TBD') + '</div>' +
                    '</div>' +
                    '<div class="score-box">' +
                        '<span class="score-val">' + escapeHtml(String(player.probability || 0)) + '%</span>' +
                        '<span class="score-label">HRR+ PROB</span>' +
                    '</div>' +
                '</div>' +

                '<div class="modal-section">' +
                    '<div class="title">Bat + Ball Snapshot</div>' +
                    '<div class="modal-grid">' +
                        statPill('Season AVG', player.season_avg_display || 'N/A') +
                        statPill('Last 5 AVG', lastFiveSummary) +
                        statPill('Avg EV', formatMetric(player.avg_ev, ' MPH')) +
                        statPill('Avg Launch Angle', formatMetric(player.avg_launch_angle, '°')) +
                        statPill('Recent EV', formatMetric(player.recent_avg_ev, ' MPH')) +
                        statPill('Recent Launch Angle', formatMetric(player.recent_launch_angle, '°')) +
                    '</div>' +
                '</div>' +

                '<div class="modal-section">' +
                    '<div class="title">Form + Context</div>' +
                    detailRow('Expected PA', String(player.expected_pa || 3.5)) +
                    detailRow('Lineup Slot', String(player.lineup_slot || 9)) +
                    detailRow('Hard-Hit Rate', formatMetric(player.hard_hit_rate, '%')) +
                    detailRow('Line Drive Rate', formatMetric(player.ld_rate, '%')) +
                    detailRow('Line Drive EV', formatMetric(player.ld_ev, ' MPH')) +
                    detailRow('EV Trend', formatMetric(player.ev_trend_val) + ' (' + (player.ev_trend_label || 'Stable') + ')') +
                    detailRow('BABIP Trend', formatMetric(player.babip_trend_val) + ' (' + (player.babip_trend_label || 'Stable') + ')') +
                '</div>' +

                (showPitcherHistory
                    ? '<div class="modal-section">' +
                        '<div class="title">Vs Opposing Starter</div>' +
                        detailRow('Pitcher', player.opp_pitcher || 'TBD') +
                        detailRow('AVG', player.vs_starter_avg_display || 'N/A') +
                        detailRow('Hits / AB', String(player.vs_starter_hits || 0) + ' / ' + String(player.vs_starter_ab || 0)) +
                        (Number(player.vs_starter_hr || 0) > 0 ? detailRow('HR', String(player.vs_starter_hr || 0)) : '') +
                        (Number(player.vs_starter_rbi || 0) > 0 ? detailRow('RBI', String(player.vs_starter_rbi || 0)) : '') +
                      '</div>'
                    : '');

            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
            document.body.style.overflow = 'hidden';
            closeBtn.focus();
        }

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', function (event) {
            if (event.target === modal) {
                closeModal();
            }
        });
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        function renderEmptyState(titleText, messageHtml) {
            dash.innerHTML = '<div class="empty-state">' +
                '<h2 style="margin:0 0 8px;">' + titleText + '</h2>' +
                '<p style="margin:0; color:#94a3b8;">' + messageHtml + '</p>' +
                '</div>';
        }

        function renderPredictionCards(predictionPlayers) {
            if (!predictionPlayers.length) {
                renderEmptyState('No H+R+RBI Data Found', 'Run <code>python python/hrbi_engine.py</code> from the repo root to generate <code>data/hrbi_model_data.js</code>.');
                return;
            }

            dash.innerHTML = predictionPlayers.map(function (p, index) {
                const tierClass = p.probability >= 8.0 ? 'high' : (p.probability >= 5.0 ? 'std' : 'watch');
                const breakdown = p.breakdown || {};
                const safeName = escapeHtml(p.name || 'Unknown');

                return '' +
                    '<article class="card card--interactive ' + tierClass + '" data-player-index="' + index + '" data-player-name="' + safeName + '" data-player-team="' + escapeHtml(p.team || '') + '" tabindex="0" role="button" aria-label="Open stats for ' + safeName + '">' +
                        '<div class="card-header">' +
                            '<div>' +
                                '<div class="team-tag">' + escapeHtml(p.team || 'TBD') + '</div>' +
                                '<h2 class="player-name">' + safeName + '</h2>' +
                                '<span class="band">' + escapeHtml(p.confidence_band || 'Watchlist') + '</span>' +
                            '</div>' +
                            '<div class="score-box">' +
                                '<span class="score-val">' + escapeHtml(String(p.probability || 0)) + '%</span>' +
                                '<span class="score-label">PROBABILITY</span>' +
                            '</div>' +
                        '</div>' +

                        '<div class="section">' +
                            '<div class="title">Signal Breakdown</div>' +
                            '<div class="breakdown-grid">' +
                                signalBlock('CONTACT', breakdown.Contact) +
                                signalBlock('FORM', breakdown.Form) +
                                signalBlock('PITCHER', breakdown.Pitcher) +
                                signalBlock('RBI', breakdown.RBI) +
                                signalBlock('RUNS', breakdown.Runs) +
                                signalBlock('PARK', breakdown.Park) +
                            '</div>' +
                        '</div>' +

                        '<div class="section">' +
                            detailRow('Lineup Slot', String(p.lineup_slot || 9)) +
                            detailRow('Expected PA', String(p.expected_pa || 3.5)) +
                            detailRow('Season AVG', String(p.season_avg_display || 'N/A')) +
                            detailRow('Last 5 AVG', String(p.last_5_avg_display || 'N/A')) +
                            detailRow('Avg EV', formatMetric(p.avg_ev, ' MPH')) +
                            detailRow('Avg Launch Angle', formatMetric(p.avg_launch_angle, '°')) +
                        '</div>' +

                        '<div class="footer">' +
                            '<span>vs ' + escapeHtml(p.opp_pitcher || 'TBD') + '</span>' +
                            '<span>' + escapeHtml(p.target || 'H+R+RBI >= 3') + '</span>' +
                        '</div>' +
                    '</article>';
            }).join('');

            Array.from(dash.querySelectorAll('.card--interactive')).forEach(function (card) {
                card.addEventListener('click', function () {
                    const player = getPlayerFromCard(card);
                    if (player) {
                        openModal(player);
                    }
                });

                card.addEventListener('keydown', function (event) {
                    if (event.key !== 'Enter' && event.key !== ' ') {
                        return;
                    }

                    event.preventDefault();
                    const player = getPlayerFromCard(card);
                    if (player) {
                        openModal(player);
                    }
                });
            });
        }

        function renderVerificationSummary(summaryData, dateStr) {
            const summary = summaryData || buildFallbackSummary([], dateStr);
            const effectiveDate = summary.date || dateStr || '';

            summaryContainer.innerHTML = '' +
                '<div class="summary-bar">' +
                    '<div class="summary-item">Date<b>' + escapeHtml(formatLongDate(effectiveDate) || 'N/A') + '</b></div>' +
                    '<div class="summary-item">Wins<b>' + escapeHtml(String(summary.wins || 0)) + '</b></div>' +
                    '<div class="summary-item">Losses<b>' + escapeHtml(String(summary.losses || 0)) + '</b></div>' +
                    '<div class="summary-item">Outliers<b>' + escapeHtml(String(summary.outliers || 0)) + '</b></div>' +
                    '<div class="summary-item">Precision<b>' + escapeHtml(formatPercent(summary.precision)) + '</b></div>' +
                    '<div class="summary-item">Recall<b>' + escapeHtml(formatPercent(summary.recall)) + '</b></div>' +
                    '<div class="summary-item">F1<b>' + escapeHtml(formatPercent(summary.f1_score)) + '</b></div>' +
                '</div>';
        }

        function renderResultsCards(rows) {
            const visibleRows = (rows || []).filter(function (row) {
                return row.classification === 'Win' || row.classification === 'Loss' || row.classification === 'Outlier';
            });

            if (!visibleRows.length) {
                renderEmptyState('No Verification Data Found', 'Run <code>python python/hrbi_results_evaluator.py --date YYYY-MM-DD</code> to generate <code>data/hrbi_results_YYYY-MM-DD.js</code>.');
                return;
            }

            const priority = { Win: 0, Loss: 1, Outlier: 2 };
            visibleRows.sort(function (a, b) {
                const statusGap = (priority[a.classification] || 9) - (priority[b.classification] || 9);
                if (statusGap !== 0) {
                    return statusGap;
                }
                return Number(b.probability || 0) - Number(a.probability || 0);
            });

            dash.innerHTML = visibleRows.map(function (row) {
                const classification = row.classification || 'NotFlagged';
                const cardClass = classification === 'Win' ? 'result-win' : (classification === 'Loss' ? 'result-loss' : 'result-outlier');
                const badgeClass = classification === 'Win' ? 'badge-win' : (classification === 'Loss' ? 'badge-loss' : 'badge-outlier');

                return '' +
                    '<article class="card ' + cardClass + '">' +
                        '<div class="card-header">' +
                            '<div>' +
                                '<div class="team-tag">' + escapeHtml(row.team || 'TBD') + '</div>' +
                                '<h2 class="player-name">' + escapeHtml(row.name || 'Unknown') + '</h2>' +
                                '<span class="band">' + escapeHtml(row.confidence_band || 'Tracked') + '</span>' +
                            '</div>' +
                            '<div class="score-box">' +
                                '<span class="score-val">' + escapeHtml(String(row.actual_total || 0)) + '</span>' +
                                '<span class="score-label">ACTUAL TOTAL</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="section">' +
                            '<div class="detail-row"><span>Verification</span><span class="results-badge ' + badgeClass + '">' + escapeHtml(classification.toUpperCase()) + '</span></div>' +
                            detailRow('Model Probability', String(row.probability || 0) + '%') +
                            detailRow('Hits', String(row.actual_hits || 0)) +
                            detailRow('Runs', String(row.actual_runs || 0)) +
                            detailRow('RBIs', String(row.actual_rbi || 0)) +
                            detailRow('Lineup Slot', String(row.lineup_slot || 'TBD')) +
                            detailRow('Expected PA', String(row.expected_pa || 3.5)) +
                        '</div>' +
                        '<div class="footer">' +
                            '<span>' + escapeHtml(row.date || '') + '</span>' +
                            '<span>Target: H+R+RBI ≥ 3</span>' +
                        '</div>' +
                    '</article>';
            }).join('');
        }

        async function loadResultsForDate(dateStr) {
            dash.innerHTML = '<div class="empty-state"><div style="margin-bottom:10px;">Loading verification...</div><div style="color:#94a3b8;">Pulling H+R+RBI model + results for ' + escapeHtml(formatLongDate(dateStr)) + '.</div></div>';
            summaryContainer.innerHTML = '';
            subtitle.textContent = buildResultsSubtitle(dateStr);
            dateSummary.textContent = 'Loading verification for ' + formatLongDate(dateStr) + '...';

            function applyLoadedData(modelRows, rows, summaryData) {
                renderVerificationSummary(summaryData, dateStr);
                renderResultsCards(rows, modelRows);
                dateSummary.textContent = 'Showing verification for ' + formatLongDate(dateStr);
            }

            if (hardHitsApi && dateStr) {
                try {
                    const [predictionPayload, resultsPayload, summaryPayload] = await Promise.all([
                        hardHitsApi.fetchJson(`/api/hrbi/predictions?date=${encodeURIComponent(dateStr)}&limit=500`),
                        hardHitsApi.fetchJson(`/api/hrbi/results?date=${encodeURIComponent(dateStr)}`),
                        hardHitsApi.fetchJson(`/api/hrbi/summary?date=${encodeURIComponent(dateStr)}`),
                    ]);

                    const modelRows = predictionPayload && Array.isArray(predictionPayload.items) ? predictionPayload.items : [];
                    const rows = resultsPayload && Array.isArray(resultsPayload.items) ? resultsPayload.items : [];
                    const summaryData = summaryPayload && typeof summaryPayload === 'object'
                        ? summaryPayload
                        : buildFallbackSummary(rows, dateStr);

                    if (modelRows.length || rows.length) {
                        const key = dateStr.replace(/-/g, '_');
                        window['hrbiModelData_' + key] = modelRows;
                        window['hrbiResultsData_' + key] = rows;
                        window['hrbiResultsSummary_' + key] = summaryData;
                        applyLoadedData(modelRows, rows, summaryData);
                        return;
                    }
                } catch (error) {
                    console.warn('Falling back to static H+R+RBI historical data:', error);
                }
            }

            if (typeof loadHrbiHistoricalData === 'function' && dateStr) {
                loadHrbiHistoricalData(dateStr).then(function () {
                    const key = dateStr.replace(/-/g, '_');
                    const modelRows = window['hrbiModelData_' + key] || players;
                    const rows = window['hrbiResultsData_' + key] || latestResults;
                    const summaryData = window['hrbiResultsSummary_' + key] || latestSummary || buildFallbackSummary(rows, dateStr);
                    applyLoadedData(modelRows, rows, summaryData);
                }).catch(function (error) {
                    console.warn('Falling back to latest H+R+RBI verification data:', error);
                    const fallbackDate = latestSummary && latestSummary.date ? latestSummary.date : dateStr;
                    applyLoadedData(players, latestResults, latestSummary || buildFallbackSummary(latestResults, fallbackDate));
                    dateSummary.textContent = 'Showing latest verification (historical file not available for ' + formatLongDate(dateStr) + ').';
                });
                return;
            }

            applyLoadedData(players, latestResults, latestSummary || buildFallbackSummary(latestResults, dateStr));
        }

        function initializeResultsView() {
            while (dateSelect.children.length > 1) {
                dateSelect.removeChild(dateSelect.lastChild);
            }

            historicalDates.forEach(function (dateStr) {
                const option = document.createElement('option');
                option.value = dateStr;
                option.textContent = formatLongDate(dateStr);
                dateSelect.appendChild(option);
            });

            const defaultDate = historicalDates[0] || (latestSummary && latestSummary.date) || (latestResults[0] && latestResults[0].date) || '';
            if (!defaultDate) {
                renderVerificationSummary(buildFallbackSummary([], ''));
                renderResultsCards([]);
                dateSummary.textContent = 'No H+R+RBI historical results available yet.';
                subtitle.textContent = 'Verification results will appear here once the evaluator runs.';
                return;
            }

            dateSelect.value = defaultDate;
            loadResultsForDate(defaultDate);
        }

        function setView(view) {
            predictionsBtn.classList.toggle('active', view === 'predictions');
            resultsBtn.classList.toggle('active', view === 'results');

            if (view === 'predictions') {
                pageTitle.textContent = 'MLB HRR+ (Hits + Runs + RBIs) Probability Model';
                subtitle.textContent = buildPredictionSubtitle();
                dateSelector.style.display = 'none';
                summaryContainer.style.display = 'none';
                renderPredictionCards(players);
                return;
            }

            pageTitle.textContent = 'HRR+ Verification & Historical Results';
            dateSelector.style.display = 'block';
            summaryContainer.style.display = 'block';
            initializeResultsView();
        }

        predictionsBtn.addEventListener('click', function () {
            setView('predictions');
        });

        resultsBtn.addEventListener('click', function () {
            setView('results');
        });

        dateSelect.addEventListener('change', function (event) {
            if (event.target.value) {
                loadResultsForDate(event.target.value);
            }
        });

        setView('predictions');
        bootstrapApiData().then(function (loadedFromApi) {
            if (!loadedFromApi) {
                return;
            }

            if (predictionsBtn.classList.contains('active')) {
                subtitle.textContent = buildPredictionSubtitle();
                renderPredictionCards(players);
            }
        });
    });
</script>
