<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | HardHits</title>
    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-bg: #111827;
            --border: #1e293b;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #f87171; 
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 100px auto; text-align: center; }

        .top-nav { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; }
        .nav-con { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo { color: var(--accent); font-weight: 900; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 25px; }
        .nav-item { color: var(--text-muted); text-decoration: none; text-transform: uppercase; font-size: 0.8rem; font-weight: 700; transition: 0.2s; border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .hero h1 { font-size: 4rem; letter-spacing: -2px; margin-bottom: 10px; }
        .hero p { color: var(--text-muted); font-size: 1.2rem; margin-bottom: 40px; }
        
        .portal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 800px; margin: 0 auto; }
        .portal-card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 40px; 
            border-radius: 15px; 
            text-decoration: none; 
            color: white; 
            transition: 0.3s;
        }
        .portal-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .portal-card h2 { color: var(--accent); margin-top: 0; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="nav-con">
        <div class="nav-logo">HARDHITS</div>
        <div class="nav-links">
            <a href="HardHits.html" class="nav-item active">Home</a>
            <a href="BvP.html" class="nav-item">BvP History</a>
            <a href="DailyHomers.html" class="nav-item">Daily Homers</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="hero">
        <h1>HARDHITS<span style="color:var(--accent)">.</span></h1>
        <p>Advanced Statcast analytics and historical performance tracking.</p>
    </div>

    <div class="portal-grid">
        <a href="BvP.html" class="portal-card">
            <h2>BvP History</h2>
            <p>Scout today's pitchers against historical home run data.</p>
        </a>
        <a href="DailyHomers.html" class="portal-card">
            <h2>Daily Homers</h2>
            <p>Real-time recap of today's hardest hits and longest bombs.</p>
        </a>
    </div>
</div>

</body>
</html>
